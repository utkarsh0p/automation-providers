# Production Activepieces for a VPS: AP + Postgres + Redis + Caddy (automatic HTTPS).
# Secrets and domain come from .env (copy .env.prod.example -> .env and fill in).
#   docker compose -f docker-compose.prod.yml up -d
# Caddy gets a real TLS cert for $AP_DOMAIN automatically (ports 80/443 must be open).
services:
  activepieces:
    image: activepieces/activepieces:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      AP_EDITION: ee
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_FRONTEND_URL: "https://${AP_DOMAIN}"
      AP_ENCRYPTION_KEY: "${AP_ENCRYPTION_KEY}"
      AP_JWT_SECRET: "${AP_JWT_SECRET}"
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: "${AP_POSTGRES_PASSWORD}"
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: "6379"
    expose:
      - "80"          # reached by Caddy over the internal network, not the public internet

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${AP_POSTGRES_PASSWORD}"
    volumes:
      - ap-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - ap-redis:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - activepieces
    environment:
      AP_DOMAIN: "${AP_DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  ap-postgres:
  ap-redis:
  caddy-data:
  caddy-config:
