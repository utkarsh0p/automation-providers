# Full production stack for the VPS:
#   caddy (auto-HTTPS) -> backend (FastAPI) + activepieces
#   activepieces -> postgres + redis
# Config/secrets come from .env in this dir (copy .env.vps.example -> .env).
#   docker compose -f docker-compose.vps.yml up -d --build
# Requires DNS A records for $API_DOMAIN and $AP_DOMAIN -> this VPS, ports 80/443 open.
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - backend
      - activepieces
    environment:
      API_DOMAIN: "${API_DOMAIN}"
      AP_DOMAIN: "${AP_DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.vps:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN}"
      ACTIVEPIECES_URL: "https://${AP_DOMAIN}"
      ACTIVEPIECES_EMBED_MODE: "iframe"
      ACTIVEPIECES_PROJECT_ID: "agentegration"
    expose:
      - "8000"

  activepieces:
    image: activepieces/activepieces:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      AP_EDITION: ee
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_FRONTEND_URL: "https://${AP_DOMAIN}"
      AP_ENCRYPTION_KEY: "${AP_ENCRYPTION_KEY}"
      AP_JWT_SECRET: "${AP_JWT_SECRET}"
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: "${AP_POSTGRES_PASSWORD}"
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: "6379"
    expose:
      - "80"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${AP_POSTGRES_PASSWORD}"
    volumes:
      - ap-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - ap-redis:/data

volumes:
  ap-postgres:
  ap-redis:
  caddy-data:
  caddy-config:
