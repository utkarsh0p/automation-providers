# Activepieces (Enterprise edition — free for development/testing) + Postgres + Redis.
# One-time setup (license key, signing key) is in ../../ACTIVEPIECES_SETUP.md.
#   docker compose -f deploy/activepieces/docker-compose.yml up -d
# Then open http://localhost:8080
services:
  activepieces:
    image: activepieces/activepieces:latest
    container_name: activepieces
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:80"
    environment:
      AP_EDITION: ee
      # ee edition rejects UNSANDBOXED; SANDBOX_CODE_ONLY needs no special container privileges.
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_FRONTEND_URL: "http://localhost:8080"
      # Dev-only secrets — regenerate for anything real:
      #   AP_ENCRYPTION_KEY: openssl rand -hex 16   (32 hex chars)
      #   AP_JWT_SECRET:     openssl rand -hex 32
      AP_ENCRYPTION_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      AP_JWT_SECRET: "dev-only-change-me-0000000000000000000000000000000000000000000000"
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: activepieces
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: "6379"

  postgres:
    image: postgres:16
    container_name: activepieces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: activepieces
    volumes:
      - ap-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: activepieces-redis
    restart: unless-stopped
    volumes:
      - ap-redis:/data

volumes:
  ap-postgres:
  ap-redis:
